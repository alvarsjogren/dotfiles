# =============================================================================
# Host-specific config (GPU env vars, monitor layout)
# =============================================================================
# host.conf is a local symlink -> hosts/laptop.conf or hosts/pc.conf,
# created once per machine. Not tracked by git (see .gitignore).
source = ~/.config/hypr/host.conf


# =============================================================================
# Autostart
# =============================================================================
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = sh -c 'awww-daemon --no-cache & sleep 1; awww img ~/Pictures/wallpapers/wallhaven-polllj.jpg --transition-type fade'

# =============================================================================
# Environment variables
# =============================================================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_THEME,Adwaita:dark

# =============================================================================
# Input
# =============================================================================
input {
    kb_layout = se
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0
}

# =============================================================================
# General
# =============================================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(dfac70ee) rgba(384778ee) 45deg
    col.inactive_border = rgba(222441aa)
    layout = dwindle
}

# =============================================================================
# Decoration
# =============================================================================
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(02050eee)
    }
}

# =============================================================================
# Animations
# =============================================================================
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = smoothSlide, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 4, smoothSlide, slide
}

# =============================================================================
# Layout
# =============================================================================
dwindle {
    preserve_split = true
}

# =============================================================================
# Misc
# =============================================================================
misc {
    middle_click_paste = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x040A1A
}

# =============================================================================
# Keybindings
# =============================================================================
$mainMod = SUPER

# Applications
bind = $mainMod, T, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, nemo
bind = $mainMod, Y, exec, kitty --class yazi -e yazi
bind = $mainMod, A, exec, wofi --show drun

# Window management
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, S, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen,

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Audio
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonitorBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonitorBrightnessDown, exec, brightnessctl set 5%-
