# =============================================================================
# Wallhaven Polllj — Yazi behaviour
# =============================================================================
[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
wrap            = "no"
tab_size        = 4
max_width       = 1000
max_height      = 1000
image_delay     = 30
image_filter    = "lanczos3"
image_quality   = 90
