# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Zoom keybindings
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+minus     change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# Tab keybindings
map alt+t new_tab
map alt+w close_tab
map alt+left  previous_tab
map alt+right next_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Cursor
cursor                  #DFAC70
cursor_text_color       #040A1A
cursor_shape            beam
cursor_blink_interval   0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
url_color       #DFAC70
url_style       single

# Window
window_padding_width    8
background_opacity      0.95
confirm_os_window_close 0

# Tab bar
tab_bar_style           separator
tab_separator           " | "
tab_title_template      "{index}: {title}"
active_tab_foreground   #DFAC70
active_tab_background   #040A1A
inactive_tab_foreground #7477A1
inactive_tab_background #040A1A

# Wallhaven Polllj color scheme
foreground              #E1E9F2
background              #040A1A
selection_foreground    #E1E9F2
selection_background    #29345C

# Black
color0                  #222441
color8                  #4B5C92

# Red
color1                  #9C6D6F
color9                  #B29098

# Green (harmonized — palette is green-free)
color2                  #8FA17A
color10                 #A7B894

# Yellow (gold / peach)
color3                  #DFAC70
color11                 #E1C4AA

# Blue (harmonized — palette is blue-free)
color4                  #7C8AC0
color12                 #97A3D0

# Magenta (mauve, lightened for legibility)
color5                  #9B6F90
color13                 #B58AAE

# Cyan (harmonized — palette is cyan-free)
color6                  #6FA89E
color14                 #8FBEB4

# White
color7                  #A4A7CD
color15                 #E1E9F2
