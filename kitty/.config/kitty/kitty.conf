# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Zoom keybindings
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+minus     change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# Cursor
cursor                  #7fdbca
cursor_text_color       #011627
cursor_shape            beam
cursor_blink_interval   0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
url_color       #7fdbca
url_style       single

# Window
window_padding_width    8
background_opacity      0.95
confirm_os_window_close 0

# Tab bar
tab_bar_style           separator
tab_separator           " | "
tab_title_template      "{index}: {title}"
active_tab_foreground   #7fdbca
active_tab_background   #011627
inactive_tab_foreground #5f7e97
inactive_tab_background #011627

# Night Owl color scheme
foreground              #d6deeb
background              #011627
selection_foreground    #011627
selection_background    #1d3b53

# Black
color0                  #011627
color8                  #5f7e97

# Red
color1                  #ef5350
color9                  #ef5350

# Green
color2                  #22da6e
color10                 #22da6e

# Yellow
color3                  #ecc48d
color11                 #ffeb95

# Blue
color4                  #82aaff
color12                 #82aaff

# Magenta
color5                  #c792ea
color13                 #c792ea

# Cyan
color6                  #7fdbca
color14                 #7fdbca

# White
color7                  #d6deeb
color15                 #ffffff
